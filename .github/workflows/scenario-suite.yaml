name: Scenario Suite

on:
  workflow_dispatch:
    inputs:
      build_timeout_minutes:
        description: Minutes to wait for build orchestration
        type: string
        default: "10"
      dispatch_timeout_minutes:
        description: Minutes to wait for dispatch confirmation
        type: string
        default: "5"
  schedule:
    - cron: '30 6 * * *'

permissions:
  contents: write
  actions: write
  pull-requests: write

concurrency:
  group: scenario-suite
  cancel-in-progress: false

env:
  MANIFEST_FILE: .github/manifest.yaml
  MANIFEST_KEY: ci
  TAG_PREFIX: v
  BOT_NAME: github-actions[bot]
  BOT_EMAIL: github-actions[bot]@users.noreply.github.com

jobs:
  scenario-suite:
    name: Scenario Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CASCADE_STATE_TEST_TOKEN }}

      - name: Setup cascade CLI
        uses: stablekernel/cascade/.github/actions/setup-cli@v0.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: v0.1.0

      - name: Configure git identity
        run: |
          git config user.name "$BOT_NAME"
          git config user.email "$BOT_EMAIL"

      - name: Seed build via PR
        id: seed
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TEST_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "scenario-suite"
          git config user.email "scenario-suite@users.noreply.github.com"
          BRANCH="scenario/src-$(date +%s)-$RANDOM"
          git fetch origin main --quiet
          git checkout -B "$BRANCH" origin/main
          mkdir -p src
          echo "scenario change $(date -u +%FT%TWZ)" >> src/build-trigger.txt
          git add src/build-trigger.txt
          git commit -m "feat: trigger build run for scenario suite"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" --title "feat: trigger build run for scenario suite" --body "Automated scenario run; drives orchestrate on merge."
          gh pr merge "$BRANCH" --squash --delete-branch
          git fetch origin main --quiet
          MERGE_SHA="$(git rev-parse origin/main)"
          echo "merge_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"

      - name: Wait for orchestrate run
        id: wait
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TEST_TOKEN }}
          MERGE_SHA: ${{ steps.seed.outputs.merge_sha }}
        run: |
          set -euo pipefail
          RUN_ID=""
          for i in $(seq 1 30); do
            RUN_ID="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow=orchestrate.yaml --branch=main \
              --json databaseId,headSha,status \
              --jq ".[] | select(.headSha==\"$MERGE_SHA\") | .databaseId" | head -n1)"
            [ -n "$RUN_ID" ] && break
            sleep 10
          done
          [ -n "$RUN_ID" ] || { echo "::error::no orchestrate run found for merge SHA $MERGE_SHA"; exit 1; }
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          MAX_WAIT=$(( ${{ inputs.build_timeout_minutes || 10 }} * 60 ))
          ELAPSED=0
          INTERVAL=15
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID" --jq '.status')
            CONCLUSION=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID" --jq '.conclusion // empty')
            echo "Status: $STATUS, Conclusion: $CONCLUSION"
            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "Orchestrate run completed successfully"
                break
              else
                echo "::error::Orchestrate run completed with conclusion: $CONCLUSION"
                exit 1
              fi
            fi
            sleep $INTERVAL
            ELAPSED=$(( ELAPSED + INTERVAL ))
          done
          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "::error::Timed out waiting for orchestrate run to complete"
            exit 1
          fi

      - name: Assert dispatch to primary
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TEST_TOKEN }}
        run: |
          echo "Checking that External Update was dispatched to primary..."
          # NOTE(A6): this reads workflow_runs[0] with no SHA/payload correlation and can pass on a stale run.
          # Strengthening to correlate on dispatched ref/SHA is out of scope for this change.
          RECENT_RUNS=$(gh api "repos/stablekernel/cascade-example-primary/actions/workflows/external-update.yaml/runs?per_page=5" --jq '.workflow_runs[].created_at' 2>/dev/null || echo "")
          if [ -z "$RECENT_RUNS" ]; then
            echo "::error::No external-update runs found on primary after dispatch"
            exit 1
          fi
          echo "External Update dispatched successfully. Recent runs:"
          echo "$RECENT_RUNS"

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Scenario Suite Results"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| Build seeded via PR | ${{ steps.seed.outcome }} |"
            echo "| Orchestrate completed | ${{ steps.wait.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"
