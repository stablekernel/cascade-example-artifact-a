name: Build Shared Artifact

on:
  workflow_call:
    inputs:
      environment:
        description: Target environment
        type: string
        required: false
        default: ""
      sha:
        description: Git SHA to build
        type: string
        required: false
        default: ${{ github.sha }}
      version:
        description: Version tag to attach to the artifact
        type: string
        required: false
        default: ""
    outputs:
      artifact_id:
        description: Identifier of the produced artifact
        value: ${{ jobs.build.outputs.artifact_id }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      artifact_id: ${{ steps.build.outputs.artifact_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Build
        id: build
        run: |
          echo "Building artifact for sha=${{ inputs.sha }} version=${{ inputs.version }}"
          sleep 2
          ARTIFACT_ID="artifact-a-${{ inputs.sha || github.sha }}"
          echo "artifact_id=${ARTIFACT_ID}" >> "$GITHUB_OUTPUT"
          echo "Artifact ID: ${ARTIFACT_ID}"
