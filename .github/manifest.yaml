ci:
  config:
    schema_version: 1
    trunk_branch: main
    cli_version: v0.13.0-rc.1
    cli_version_sha: 3ed14b65af7c3922f45bca4126386fe8009e8027
    state_token: ${{ secrets.CASCADE_STATE_TOKEN }}
    manifest_file: .github/manifest.yaml
    manifest_key: ci
    triggers:
      - src/**
    builds:
      - name: shared
        workflow: .github/workflows/build-shared.yaml
        triggers: []
    notify:
      repo: stablekernel/cascade-example-primary
      workflow: external-update.yaml
      token: CASCADE_STATE_TOKEN
      deploy_name: artifact-a
      environment: staging
  state:
    prerelease:
      sha: 2cb03e6c59056ee9ba1e1281a11dc4b6e1a5dd9d
      version: v0.1.0-rc.0
      committed_at: "2026-07-09T19:24:00Z"
      committed_by: joshua-temple
