ci:
  config:
    schema_version: 1
    trunk_branch: main
    cli_version: v0.16.2-rc.2
    cli_version_sha: 24a911250c5f899cac8bbe97a5170286c99978fb
    state_token: ${{ secrets.CASCADE_STATE_TOKEN }}
    manifest_file: .github/manifest.yaml
    manifest_key: ci
    triggers:
      - src/**
    builds:
      - name: shared
        workflow: .github/workflows/build-shared.yaml
        triggers: []
    notify:
      repo: stablekernel/cascade-example-primary
      workflow: external-update.yaml
      token: CASCADE_STATE_TOKEN
      deploy_name: artifact-a
      environment: staging
  state:
    prerelease:
      sha: 6f30bba3e459dec51a9dc7dbc950110d0b4bb2cf
      version: v0.16.2-rc.2
      committed_at: "2026-07-16T18:07:10Z"
      committed_by: joshua-temple
