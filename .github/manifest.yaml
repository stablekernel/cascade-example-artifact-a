ci:
  config:
    schema_version: 1
    trunk_branch: main
    cli_version: v0.16.5-rc.2
    cli_version_sha: 2231b2bee90615ffb66cdee3a3cfd410720df370
    state_token: ${{ secrets.CASCADE_STATE_TOKEN }}
    manifest_file: .github/manifest.yaml
    manifest_key: ci
    triggers:
      - src/**
    builds:
      - name: shared
        workflow: .github/workflows/build-shared.yaml
        triggers: []
    notify:
      repo: stablekernel/cascade-example-primary
      workflow: external-update.yaml
      token: CASCADE_STATE_TOKEN
      deploy_name: artifact-a
      environment: staging
  state:
    prerelease:
      sha: 049e97ed0a050d09aaad6e741b311db38ede30dc
      version: v0.1.0-rc.0
      committed_at: "2026-07-19T18:00:25Z"
