ci:
  config:
    schema_version: 1
    trunk_branch: main
    cli_version: v0.16.6-dryrun.82
    cli_version_sha: 82d7a676a50e7a54ad666d0f55277dcf04415cfb
    state_token: ${{ secrets.CASCADE_STATE_TOKEN }}
    manifest_file: .github/manifest.yaml
    manifest_key: ci
    triggers:
      - src/**
    builds:
      - name: shared
        workflow: .github/workflows/build-shared.yaml
        triggers: []
    notify:
      repo: stablekernel/cascade-example-primary
      workflow: external-update.yaml
      token: CASCADE_STATE_TOKEN
      deploy_name: artifact-a
      environment: staging
  state:
    prerelease:
      sha: 41ac6370d4d7dd4a0d24052948a753307809857b
      version: v0.1.0-rc.0
      committed_at: "2026-07-20T14:57:00Z"
      committed_by: joshua-temple
