ci:
  config:
    schema_version: 1
    trunk_branch: main
    cli_version: v0.5.0-rc.6
    state_token: ${{ secrets.CASCADE_STATE_TOKEN }}
    manifest_file: .github/manifest.yaml
    manifest_key: ci
    triggers:
      - src/**
    builds:
      - name: shared
        workflow: .github/workflows/build-shared.yaml
        triggers: []
    notify:
      repo: stablekernel/cascade-example-primary
      workflow: external-update.yaml
      token: CASCADE_STATE_TOKEN
      deploy_name: artifact-a
      environment: staging
  state:
    prerelease:
      sha: c1b68e936cac894fa6614a2695914622be70b595
      version: v0.5.0-rc.6
      committed_at: "2026-06-25T18:40:41Z"
      committed_by: joshua-temple
