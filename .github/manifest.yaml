ci:
  config:
    schema_version: 1
    trunk_branch: main
    cli_version: v0.16.4-rc.0
    cli_version_sha: 25b365f7f4f16de174120c30cb060b35fa63accd
    state_token: ${{ secrets.CASCADE_STATE_TOKEN }}
    manifest_file: .github/manifest.yaml
    manifest_key: ci
    triggers:
      - src/**
    builds:
      - name: shared
        workflow: .github/workflows/build-shared.yaml
        triggers: []
    notify:
      repo: stablekernel/cascade-example-primary
      workflow: external-update.yaml
      token: CASCADE_STATE_TOKEN
      deploy_name: artifact-a
      environment: staging
  state:
    prerelease:
      sha: de8bbdc6561036185bd5a8f1f412604154b865c8
      version: v0.1.0-rc.0
      committed_at: "2026-07-17T10:58:21Z"
      committed_by: joshua-temple
